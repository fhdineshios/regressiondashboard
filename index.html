<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regression progress</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #f7f7f4; --card: #ffffff; --card2: #f4f4f1;
    --text: #1f2328; --text2: #5f5e5a; --muted: #8b8b86; --faint: #b4b2a9;
    --border: #e2e2dd; --border2: #d9d9d4; --track: #e8e8e4;
    --hover: #f7f9fb; --notebg: #f7f7f4;
    --green: #1d9e75; --red: #e24b4a; --amber: #ef9f27;
    --passbg: #e1f5ee; --passfg: #085041; --passbd: #5dcaa5;
    --failbg: #fcebeb; --failfg: #791f1f; --failbd: #f09595;
    --blockbg: #faeeda; --blockfg: #633806; --blockbd: #fac775;
    --neutbg: #f1efe8; --neutfg: #5f5e5a;
    --badrow: #fdf3f3; --badrowh: #fbeaea;
    --link: #185fa5; --linkbg: #e6f1fb; --linkbd: #b5d4f4; --linkbgh: #d3e6f8;
    --allon: #1f2328; --allonfg: #ffffff;
    --focus: #b5d4f4;
  }
  [data-theme="dark"] {
    --bg: #15171b; --card: #1e2126; --card2: #24272d;
    --text: #e8e8e5; --text2: #b0afa9; --muted: #8b8b86; --faint: #6a6a66;
    --border: #33363c; --border2: #3d4046; --track: #2c2f35;
    --hover: #23272e; --notebg: #191c20;
    --green: #2ab388; --red: #e05b5a; --amber: #f0a733;
    --passbg: #0d3b2d; --passfg: #9fe1cb; --passbd: #0f6e56;
    --failbg: #45191a; --failfg: #f7c1c1; --failbd: #793030;
    --blockbg: #3f2c10; --blockfg: #fac775; --blockbd: #7a5416;
    --neutbg: #2a2d33; --neutfg: #b0afa9;
    --badrow: #291b1c; --badrowh: #322022;
    --link: #85b7eb; --linkbg: #12283d; --linkbd: #1d4a73; --linkbgh: #17324c;
    --allon: #e8e8e5; --allonfg: #15171b;
    --focus: #1d4a73;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    padding: 28px 16px 64px; transition: background .25s, color .25s;
  }
  .wrap { max-width: 1000px; margin: 0 auto; }

  .top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
  h1 { font-size: 21px; font-weight: 650; }
  .sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .jirabtn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--link);
    background: var(--linkbg); border: 1px solid var(--linkbd); border-radius: 8px;
    padding: 7px 14px; text-decoration: none; margin-top: 8px; transition: background .15s;
  }
  .jirabtn:hover { background: var(--linkbgh); }
  .rightbox { display: flex; align-items: center; gap: 14px; }
  .ringbox { display: flex; align-items: center; gap: 10px; }
  .ringlabel { font-size: 12px; color: var(--text2); line-height: 1.35; }
  .ring circle.fg { transition: stroke-dashoffset 1s ease; }
  .ring .track { stroke: var(--track); }
  .ring .fg { stroke: var(--green); }
  .ring text { fill: var(--text); }

  .themebtn {
    width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
    border: 1px solid var(--border2); background: var(--card); color: var(--text);
    font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
    transition: transform .15s, background .15s;
  }
  .themebtn:hover { transform: rotate(15deg) scale(1.06); background: var(--card2); }

  .bar { display: flex; height: 18px; border-radius: 9px; overflow: hidden; background: var(--track); margin-bottom: 14px; }
  .bar div { width: 0; transition: width .8s ease; }
  .bar .p { background: var(--green); }
  .bar .f { background: var(--red); }
  .bar .b { background: var(--amber); }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    font: inherit; font-size: 13px; padding: 5px 14px; border-radius: 16px; cursor: pointer;
    background: var(--card); color: var(--text2); border: 1px solid var(--border2); transition: all .15s;
  }
  .chip:hover { border-color: var(--faint); }
  .chip.all.on { background: var(--allon); color: var(--allonfg); border-color: var(--allon); font-weight: 600; }
  .chip.pass.on { background: var(--passbg); color: var(--passfg); border-color: var(--passbd); font-weight: 600; }
  .chip.fail.on { background: var(--failbg); color: var(--failfg); border-color: var(--failbd); font-weight: 600; }
  .chip.blocked.on { background: #fac775; color: #4a2f04; border-color: #ba7517; font-weight: 600; }
  [data-theme="dark"] .chip.blocked.on { background: #5c3f0e; color: #fac775; border-color: #ef9f27; }
  .chip.na.on { background: #e6f1fb; color: #0c447c; border-color: #85b7eb; font-weight: 600; }
  [data-theme="dark"] .chip.na.on { background: #12283d; color: #b5d4f4; border-color: #378add; }
  .chip.remaining.on { background: var(--neutbg); color: var(--text); border-color: var(--faint); font-weight: 600; }

  .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  input[type="search"], select {
    font: inherit; font-size: 14px; padding: 8px 12px;
    border: 1px solid var(--border2); border-radius: 8px; background: var(--card); color: var(--text);
  }
  input[type="search"] { flex: 1; min-width: 170px; }
  input[type="search"]:focus, select:focus { outline: 2px solid var(--focus); }

  .tablebox { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card); }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; table-layout: fixed; }
  th {
    text-align: left; padding: 10px 12px; background: var(--card2); color: var(--text2);
    font-weight: 600; font-size: 12.5px; cursor: pointer; user-select: none; white-space: nowrap;
  }
  th:hover { color: var(--text); }
  th .dir { font-size: 10px; }
  td { padding: 9px 12px; border-top: 1px solid var(--border); vertical-align: top; overflow-wrap: break-word; }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: var(--hover); }
  tr.bad { background: var(--badrow); }
  tr.bad:hover { background: var(--badrowh); }
  tbody tr { cursor: default; }
  tr.has-com { cursor: pointer; }
  .teamtag { display: inline-block; font-size: 11px; background: var(--neutbg); color: var(--neutfg); padding: 2px 8px; border-radius: 8px; }
  .pill { display: inline-block; font-size: 12px; font-weight: 500; padding: 2px 10px; border-radius: 10px; white-space: nowrap; }
  .pill.pass { background: var(--passbg); color: var(--passfg); }
  .pill.fail { background: var(--failbg); color: var(--failfg); }
  .pill.blocked { background: var(--blockbg); color: var(--blockfg); }
  .pill.na, .pill.remaining { background: var(--neutbg); color: var(--neutfg); }
  .apptag { display: inline-block; font-size: 10.5px; margin-left: 4px; padding: 1px 7px; border-radius: 8px; background: var(--failbg); color: var(--failfg); }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .dash { color: var(--faint); }
  .com { color: var(--text2); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr.open .com { white-space: pre-wrap; overflow: visible; }
  .footer { margin-top: 16px; font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .footer label { cursor: pointer; color: var(--link); }
  #filepick { display: none; }
  #msg { padding: 24px; text-align: center; color: var(--muted); font-size: 14px; }
  @media (max-width: 680px) {
    th.hide-m, td.hide-m { display: none; }
    body { padding: 18px 10px 48px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1 id="title">Regression progress</h1>
      <div class="sub" id="updated"></div>
      <a class="jirabtn" id="jiralink" href="#" target="_blank" rel="noopener" style="display:none">
        Open Jira defect filter <span aria-hidden="true">&#8599;</span>
      </a>
    </div>
    <div class="rightbox">
      <div class="ringbox">
        <svg class="ring" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Pass rate">
          <circle class="track" cx="32" cy="32" r="27" fill="none" stroke-width="7"/>
          <circle class="fg" cx="32" cy="32" r="27" fill="none" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="169.6" stroke-dashoffset="169.6"
            transform="rotate(-90 32 32)"/>
          <text id="ringpct" x="32" y="37" text-anchor="middle" font-size="14" font-weight="600">–</text>
        </svg>
        <div class="ringlabel">pass rate<br>of tested</div>
      </div>
      <button class="themebtn" id="themebtn" aria-label="Toggle dark mode" title="Toggle dark / light theme">&#9789;</button>
    </div>
  </div>

  <div class="bar" id="bar"><div class="p"></div><div class="f"></div><div class="b"></div></div>

  <div class="chips" id="chips"></div>

  <div class="controls">
    <input type="search" id="search" placeholder="Search features, QA, Jira, comments...">
    <select id="teamFilter"><option value="">All teams</option></select>
    <select id="qaFilter"><option value="">All QA</option></select>
  </div>

  <div class="tablebox">
    <table>
      <thead>
        <tr>
          <th data-k="feature" style="width:30%">Feature <span class="dir"></span></th>
          <th data-k="team" class="hide-m" style="width:10%">Team <span class="dir"></span></th>
          <th data-k="qa" style="width:13%">QA <span class="dir"></span></th>
          <th data-k="status" style="width:13%">Status <span class="dir"></span></th>
          <th data-k="jira" style="width:16%">Jira <span class="dir"></span></th>
          <th data-k="comments" style="width:18%">Comments <span class="dir"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="msg" style="display:none"></div>
  </div>

  <div class="footer">
    <span>Chips filter by status · click a row with a comment to expand it · headers sort</span>
    <label>Preview a local CSV<input type="file" id="filepick" accept=".csv"></label>
  </div>
</div>

<script>
var JIRA_BASE = "https://touch2success.atlassian.net/browse/";
var STATUSES = ["All", "Pass", "Fail", "Blocked", "NA", "Remaining"];
var allRows = [];
var activeStatus = "All";
var sortKey = "sno", sortDir = 1;

// Theme: light (white) by default; dark only if the viewer chose it before
(function () {
  var saved = null;
  try { saved = localStorage.getItem("theme"); } catch (e) {}
  if (saved === "dark") document.documentElement.setAttribute("data-theme", "dark");
})();
function themeIcon() {
  var dark = document.documentElement.getAttribute("data-theme") === "dark";
  document.getElementById("themebtn").innerHTML = dark ? "&#9788;" : "&#9789;";
}
document.addEventListener("DOMContentLoaded", themeIcon);

function norm(v) { return (v || "").toString().trim(); }

function statusOf(raw) {
  var s = norm(raw).toLowerCase();
  if (!s) return "Remaining";
  if (s === "pass" || s === "passed") return "Pass";
  if (s === "fail" || s === "failed") return "Fail";
  if (s === "blocked" || s === "block") return "Blocked";
  if (s === "na" || s === "n/a" || s.indexOf("not testable") !== -1) return "NA";
  return "Remaining";
}

function esc(s) {
  return norm(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function jiraCell(raw) {
  var v = norm(raw);
  if (!v) return '<span class="dash">—</span>';
  var parts = v.split(/[\s,\n]+/).filter(Boolean);
  var out = [];
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i];
    if (/^https?:\/\//i.test(p)) {
      var id = p.split("/").pop();
      out.push('<a href="' + esc(p) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(id) + ' &#8599;</a>');
    } else if (/^[A-Za-z][A-Za-z0-9]+-\d+$/.test(p)) {
      out.push('<a href="' + JIRA_BASE + p + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(p) + ' &#8599;</a>');
    } else {
      out.push(esc(p));
    }
  }
  return out.join("<br>");
}

function findCol(headers, patterns, exclude) {
  for (var i = 0; i < patterns.length; i++) {
    for (var j = 0; j < headers.length; j++) {
      if (patterns[i].test(headers[j]) && (!exclude || !exclude.test(headers[j]))) return j;
    }
  }
  return -1;
}

function load(csvText, updatedText) {
  var res = Papa.parse(csvText, { skipEmptyLines: true });
  var grid = res.data;

  var hIdx = -1;
  for (var i = 0; i < Math.min(grid.length, 5); i++) {
    if (grid[i].some(function (c) { return /feature/i.test(norm(c)); })) { hIdx = i; break; }
  }
  if (hIdx === -1) hIdx = 0;

  var runTitle = "", filterUrl = "";
  for (var r = 0; r < hIdx; r++) {
    grid[r].forEach(function (cell) {
      var c = norm(cell);
      if (!c) return;
      var m = c.match(/https?:\/\/[^\s"']+/);
      if (m) { filterUrl = m[0]; return; }
      if (!runTitle) runTitle = c;
    });
  }
  if (runTitle) document.getElementById("title").textContent = runTitle;
  var jl = document.getElementById("jiralink");
  if (filterUrl) { jl.href = filterUrl; jl.style.display = "inline-flex"; }
  else { jl.style.display = "none"; }

  var headers = grid[hIdx].map(norm);
  var cFeature = findCol(headers, [/feature/i]);
  var cTeam = findCol(headers, [/team/i]);
  var cQa = findCol(headers, [/^qa$/i, /qa/i]);
  var cStatus = findCol(headers, [/foodhub\s*web(?!.*app)/i, /web\s*status/i, /^web$/i, /status/i], /app/i);
  var cApp = findCol(headers, [/app\s*status/i]);
  var cJira = findCol(headers, [/jira/i]);
  var cComment = findCol(headers, [/comment/i, /^status$/i]);
  if (cComment === cStatus) cComment = -1;
  var cReason = findCol(headers, [/reason/i, /remark/i, /note/i]);

  allRows = [];
  for (var k = hIdx + 1; k < grid.length; k++) {
    var row = grid[k];
    var feat = cFeature >= 0 ? norm(row[cFeature]) : "";
    if (!feat) continue;
    var comBits = [];
    if (cComment >= 0 && norm(row[cComment])) comBits.push(norm(row[cComment]));
    if (cReason >= 0 && norm(row[cReason])) comBits.push(norm(row[cReason]));
    allRows.push({
      sno: k,
      feature: feat,
      team: cTeam >= 0 ? norm(row[cTeam]) : "",
      qa: cQa >= 0 ? norm(row[cQa]) : "",
      status: statusOf(cStatus >= 0 ? row[cStatus] : ""),
      app: statusOf(cApp >= 0 ? row[cApp] : ""),
      jira: cJira >= 0 ? norm(row[cJira]) : "",
      comments: comBits.join("\n")
    });
  }

  if (updatedText) {
    var upd = document.getElementById("updated");
    upd.dataset.base = updatedText;
  }
  buildFilters();
  render(true);
}

function buildFilters() {
  var teams = {}, qas = {};
  allRows.forEach(function (r) {
    if (r.team) teams[r.team] = 1;
    if (r.qa) r.qa.split("/").forEach(function (q) {
      q = norm(q);
      if (q && q.toLowerCase() !== "na") qas[q.charAt(0).toUpperCase() + q.slice(1).toLowerCase()] = 1;
    });
  });
  fillSelect("teamFilter", Object.keys(teams).sort(), "All teams");
  fillSelect("qaFilter", Object.keys(qas).sort(), "All QA");
}

function fillSelect(id, items, label) {
  var sel = document.getElementById(id);
  var cur = sel.value;
  sel.innerHTML = '<option value="">' + label + "</option>";
  items.forEach(function (t) {
    var o = document.createElement("option");
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
  sel.value = cur;
}

function counts() {
  var c = { Pass: 0, Fail: 0, Blocked: 0, NA: 0, Remaining: 0 };
  allRows.forEach(function (r) { c[r.status]++; });
  c.All = allRows.length;
  return c;
}

function render(animate) {
  var q = document.getElementById("search").value.toLowerCase();
  var team = document.getElementById("teamFilter").value;
  var qa = document.getElementById("qaFilter").value.toLowerCase();

  var rows = allRows.filter(function (r) {
    if (activeStatus !== "All" && r.status !== activeStatus) return false;
    if (team && r.team !== team) return false;
    if (qa && r.qa.toLowerCase().indexOf(qa) === -1) return false;
    if (q && (r.feature + " " + r.qa + " " + r.team + " " + r.jira + " " + r.comments).toLowerCase().indexOf(q) === -1) return false;
    return true;
  });

  rows.sort(function (a, b) {
    var x = a[sortKey], y = b[sortKey];
    if (sortKey === "sno") return (x - y) * sortDir;
    x = (x || "").toString().toLowerCase(); y = (y || "").toString().toLowerCase();
    if (x < y) return -1 * sortDir;
    if (x > y) return 1 * sortDir;
    return a.sno - b.sno;
  });

  var c = counts();
  var total = allRows.length;
  var tested = c.Pass + c.Fail + c.Blocked;
  var remaining = c.Remaining + c.NA;

  var bar = document.getElementById("bar");
  var run = function () {
    bar.children[0].style.width = (total ? c.Pass / total * 100 : 0) + "%";
    bar.children[1].style.width = (total ? c.Fail / total * 100 : 0) + "%";
    bar.children[2].style.width = (total ? c.Blocked / total * 100 : 0) + "%";
  };
  animate ? requestAnimationFrame(run) : run();

  var rate = tested ? Math.round(c.Pass / tested * 100) : 0;
  document.getElementById("ringpct").textContent = total ? rate + "%" : "–";
  var circ = 169.6;
  var setRing = function () {
    document.querySelector(".ring .fg").style.strokeDashoffset = circ - (circ * rate / 100);
  };
  animate ? requestAnimationFrame(setRing) : setRing();

  var chipbox = document.getElementById("chips");
  chipbox.innerHTML = "";
  STATUSES.forEach(function (s) {
    var b = document.createElement("button");
    b.className = "chip " + s.toLowerCase() + (activeStatus === s ? " on" : "");
    var label = s === "All" ? "All" : s === "Pass" ? "Passed" : s === "Fail" ? "Failed" : s;
    b.textContent = label + " " + c[s];
    b.onclick = function () { activeStatus = s; render(false); };
    chipbox.appendChild(b);
  });

  document.querySelectorAll("th").forEach(function (th) {
    th.querySelector(".dir").textContent = th.dataset.k === sortKey ? (sortDir === 1 ? "▲" : "▼") : "";
  });

  var html = "";
  rows.forEach(function (r) {
    var bad = (r.status === "Fail" || r.status === "Blocked") ? " bad" : "";
    var hasCom = r.comments ? " has-com" : "";
    html += '<tr class="' + hasCom + bad + '"' + (r.comments ? " onclick=\"this.classList.toggle('open')\"" : "") + ">" +
      "<td>" + esc(r.feature) + "</td>" +
      '<td class="hide-m">' + (r.team ? '<span class="teamtag">' + esc(r.team) + "</span>" : '<span class="dash">—</span>') + "</td>" +
      "<td>" + (esc(r.qa) || '<span class="dash">—</span>') + "</td>" +
      '<td><span class="pill ' + r.status.toLowerCase() + '">' + r.status + "</span>" +
      (r.app === "Fail" ? '<span class="apptag">App: Fail</span>' : "") + "</td>" +
      "<td>" + jiraCell(r.jira) + "</td>" +
      "<td>" + (r.comments ? '<div class="com">' + esc(r.comments) + "</div>" : '<span class="dash">—</span>') + "</td>" +
      "</tr>";
  });
  document.getElementById("tbody").innerHTML = html;

  var msg = document.getElementById("msg");
  msg.style.display = rows.length ? "none" : "block";
  msg.textContent = total ? "No rows match your filters." : "";

  var upd = document.getElementById("updated");
  var base = upd.dataset.base || "";
  var sub = total
    ? c.Pass + " passed · " + (c.Fail + c.Blocked) + " failed / blocked · " + remaining + " remaining — " + total + " total" +
      (rows.length !== total ? " (showing " + rows.length + ")" : "")
    : "";
  upd.textContent = sub + (base ? " · " + base : "");
}

document.getElementById("themebtn").addEventListener("click", function () {
  var root = document.documentElement;
  var dark = root.getAttribute("data-theme") === "dark";
  if (dark) root.removeAttribute("data-theme");
  else root.setAttribute("data-theme", "dark");
  try { localStorage.setItem("theme", dark ? "light" : "dark"); } catch (e) {}
  themeIcon();
});

document.getElementById("search").addEventListener("input", function () { render(false); });
document.getElementById("teamFilter").addEventListener("change", function () { render(false); });
document.getElementById("qaFilter").addEventListener("change", function () { render(false); });
document.querySelectorAll("th").forEach(function (th) {
  th.addEventListener("click", function () {
    var k = th.dataset.k;
    if (sortKey === k) sortDir = -sortDir; else { sortKey = k; sortDir = 1; }
    render(false);
  });
});

document.getElementById("filepick").addEventListener("change", function (e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function () { load(reader.result, "Local preview: " + file.name); };
  reader.readAsText(file);
});

fetch("data.csv?v=" + Date.now())
  .then(function (r) {
    if (!r.ok) throw new Error("not found");
    var lm = r.headers.get("last-modified");
    return r.text().then(function (t) {
      var when = lm ? "Updated " + new Date(lm).toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" }) : "";
      load(t, when);
    });
  })
  .catch(function () {
    document.getElementById("updated").textContent =
      "Couldn't load data.csv — make sure a file named data.csv is in the same folder, or preview a local CSV below.";
  });
</script>
